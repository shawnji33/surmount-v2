          *, *::before, *::after { box-sizing: border-box; }
          html, body { height: 100%; margin: 0; padding: 0; }
          * { letter-spacing: -0.5px; }

          /* ── Mobile: plain white canvas ── */
          html, body, #root { background-color: #fcfcfc; }
          #root { height: 100%; }

          /* ── Desktop: iPhone 17 Pro frame ── */
          @media (min-width: 500px) {
            body {
              display: flex;
              align-items: center;
              justify-content: center;
              min-height: 100vh;
              background: #e8e8ea;
              padding: 40px 0;
            }

            .iphone-frame {
              position: relative;
              width: 430px;
              height: 932px;
              border-radius: 54px;
              background: linear-gradient(160deg, #d0d0d2 0%, #b8b8ba 40%, #a8a8aa 100%);
              box-shadow:
                0 0 0 1px rgba(0,0,0,0.10),
                inset 0 0 0 1px rgba(255,255,255,0.40),
                0 32px 80px rgba(0,0,0,0.18),
                0 8px 24px rgba(0,0,0,0.10);
              flex-shrink: 0;
            }

            /* Titanium band highlight */
            .iphone-frame::before {
              content: &#x27;&#x27;;
              position: absolute;
              inset: 0;
              border-radius: 54px;
              background: linear-gradient(
                135deg,
                rgba(255,255,255,0.55) 0%,
                rgba(255,255,255,0.10) 35%,
                transparent 60%,
                rgba(255,255,255,0.15) 100%
              );
              pointer-events: none;
              z-index: 10;
            }

            /* Screen inset */
            .iphone-screen {
              position: absolute;
              top: 12px;
              left: 12px;
              right: 12px;
              bottom: 12px;
              border-radius: 44px;
              overflow: hidden;
              background: #fcfcfc;
            }

            /* Dynamic Island */
            .dynamic-island {
              position: absolute;
              top: 14px;
              left: 50%;
              transform: translateX(-50%);
              width: 126px;
              height: 37px;
              background: #000;
              border-radius: 20px;
              z-index: 9999;
              box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
            }

            /* #root fills the screen inset */
            #root {
              position: absolute;
              inset: 0;
              height: 100%;
              overflow: hidden;
            }

            /* Side buttons */
            .btn-action {
              position: absolute;
              left: -3px;
              top: 156px;
              width: 4px;
              height: 36px;
              background: linear-gradient(180deg, #c0c0c2 0%, #a8a8aa 100%);
              border-radius: 2px 0 0 2px;
